name: Release

# Publish all packages to npm via Trusted Publisher (OIDC).
# Modeled after AgentiX-E/timesfm-ts release workflow.
#
# OIDC (OpenID Connect) authenticates to npm without stored tokens.
# Requires npm package to be configured for Trusted Publishing:
# https://docs.npmjs.com/creating-and-publishing-packages-with-a-github-actions-workflow

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dist_tag:
        description: 'npm dist-tag'
        required: true
        default: 'alpha'
        type: choice
        options:
          - alpha
          - latest

permissions:
  contents: read
  id-token: write  # OIDC — npm provenance + trusted publisher

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # Stage 1 — Quality Gate
  # ═══════════════════════════════════════════════════════════════════════
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build core package
        run: pnpm --filter @agentix-e/nl2spel build

      - name: TypeScript typecheck
        run: pnpm -r run typecheck

      - name: Format check
        run: pnpm format:check

      - name: Run tests
        run: pnpm -r run test --coverage --reporter=verbose

  # ═══════════════════════════════════════════════════════════════════════
  # Stage 2 — Publish to npm (OIDC Trusted Publisher)
  # ═══════════════════════════════════════════════════════════════════════
  publish:
    name: Publish to npm
    needs: quality
    if: ${{ !cancelled() && needs.quality.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      # Node 24 bundles npm 11.x which natively supports OIDC tokens.
      # npm 10.x (Node 22) falls back to .npmrc authToken, breaking OIDC.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build core package
        run: pnpm --filter @agentix-e/nl2spel build

      - name: Build all packages
        run: pnpm build

      - name: Determine npm dist-tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.dist_tag }}" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ github.ref_name }}"
            if echo "$TAG" | grep -qE 'alpha|beta|rc|preview'; then
              echo "tag=alpha" >> "$GITHUB_OUTPUT"
            else
              echo "tag=latest" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Publish packages to npm
        run: |
          for pkg in nl2spel nl2spel-openai nl2spel-webllm; do
            cd "packages/${pkg}"
            PKG_NAME=$(node -p "require('./package.json').name")
            PKG_VER=$(node -p "require('./package.json').version")

            if npm view "${PKG_NAME}@${PKG_VER}" version >/dev/null 2>&1; then
              echo "⚠ ${PKG_NAME}@${PKG_VER} already published — skipping"
              cd ../..
              continue
            fi

            npm publish --access public --tag "${{ steps.tag.outputs.tag }}" --no-git-checks --provenance
            cd ../..
          done

      - name: Publish summary
        if: always()
        run: |
          echo "### 📦 npm Packages Published" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | Version | Tag |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|---------|-----|" >> "$GITHUB_STEP_SUMMARY"
          for pkg in nl2spel nl2spel-openai nl2spel-webllm; do
            name=$(node -p "require('./packages/${pkg}/package.json').name")
            version=$(node -p "require('./packages/${pkg}/package.json').version")
            echo "| \`${name}\` | ${version} | ${{ steps.tag.outputs.tag }} |" >> "$GITHUB_STEP_SUMMARY"
          done

  # ═══════════════════════════════════════════════════════════════════════
  # Stage 3 — GitHub Release (tag only)
  # ═══════════════════════════════════════════════════════════════════════
  github-release:
    name: GitHub Release
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          VER_NUM="${VERSION#v}"
          if grep -q "^## \[${VER_NUM}\]" CHANGELOG.md; then
            awk "/^## \[${VER_NUM}\]/,/^## \[/" CHANGELOG.md | sed '1d;$d' | sed '/^---/d' > release-notes.md
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${VER_NUM}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.changelog.outputs.version }}
          body_path: ${{ steps.changelog.outputs.has_notes == 'true' && 'release-notes.md' || '' }}
          generate_release_notes: true
