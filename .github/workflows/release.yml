name: Release

# Release workflow — publishes all packages to npm via Trusted Publisher (OIDC)
# Triggered on version tags (v*.*.*) or manual dispatch

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag'
        required: true
        default: 'alpha'
        type: choice
        options:
          - alpha
          - latest

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ===== Quality gate (typecheck + format + test) before publishing =====
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build core package
        run: pnpm --filter @agentix-e/nl2spel build

      - name: TypeScript typecheck
        run: pnpm -r run typecheck

      - name: Format check
        run: pnpm format:check

      - name: Run tests
        run: pnpm -r run test --coverage --reporter=verbose

  # ===== Publish to npm =====
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [quality-gate]

    permissions:
      contents: read
      id-token: write  # Required for OIDC (npm provenance)

    strategy:
      matrix:
        package: [nl2spel, nl2spel-openai, nl2spel-webllm]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core package
        run: pnpm --filter @agentix-e/nl2spel build

      - name: Build ${{ matrix.package }}
        run: pnpm --filter @agentix-e/${{ matrix.package }} build

      - name: Determine npm tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            TAG="${{ github.ref_name }}"
            if echo "$TAG" | grep -qE 'alpha|beta|rc|preview'; then
              echo "tag=alpha" >> $GITHUB_OUTPUT
            else
              echo "tag=latest" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Publish @agentix-e/${{ matrix.package }}
        run: |
          cd packages/${{ matrix.package }}
          pnpm publish --access public --tag ${{ steps.tag.outputs.tag }} --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

  # ===== GitHub Release (tag-based only) =====
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [publish]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          VER_NUM="${VERSION#v}"
          if grep -q "^## \[${VER_NUM}\]" CHANGELOG.md; then
            awk "/^## \[${VER_NUM}\]/,/^## \[/" CHANGELOG.md | sed '1d;$d' | sed '/^---/d' > release-notes.md
            echo "has_notes=true" >> $GITHUB_OUTPUT
          else
            echo "has_notes=false" >> $GITHUB_OUTPUT
          fi
          echo "version=${VER_NUM}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.changelog.outputs.version }}
          body_path: ${{ steps.changelog.outputs.has_notes == 'true' && 'release-notes.md' || '' }}
          generate_release_notes: true
