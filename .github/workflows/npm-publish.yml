name: npm Publish

# Manual trigger: publish all packages to npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag (alpha | latest)'
        required: true
        default: 'alpha'
        type: choice
        options:
          - alpha
          - latest

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    strategy:
      matrix:
        package: [nl2spel, nl2spel-openai, nl2spel-webllm]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build ${{ matrix.package }}
        run: pnpm --filter @agentix-e/${{ matrix.package }} build

      - name: Publish ${{ matrix.package }}
        run: pnpm --filter @agentix-e/${{ matrix.package }} publish --access public --tag ${{ github.event.inputs.tag }} --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
